<ion-header>
  <ion-toolbar>
    <ion-button slot="start" fill="clear" (click)="voltar()">
      <ion-icon name="chevron-back-outline"></ion-icon>
    </ion-button>
    <ion-title>Professores Cadastrados</ion-title>
    <app-logout-button slot="end"></app-logout-button>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="page-shell">
    <section class="page-hero">
      <p class="eyebrow">Equipe</p>
      <h1>Perfis aprovados</h1>
      <p>Visualize os professores cadastrados e altere o nivel de acesso quando necessario.</p>
    </section>

    <div class="approved-list" *ngIf="approvedUsers.length > 0; else emptyApproved">
      <article class="approved-card surface-panel" *ngFor="let user of approvedUsers">
        <div class="user-copy">
          <h2>{{ user.name }}</h2>
          <p>{{ user.email }}</p>
          <span class="role-badge">{{ user.role }}</span>
        </div>

        <ion-button color="primary" (click)="changeRole(user.id, user.role)">
          Mudar para {{ user.role === 'teacher' ? 'Admin' : 'Teacher' }}
        </ion-button>
      </article>
    </div>

    <ng-template #emptyApproved>
      <div class="empty-state surface-panel">
        <p>Nenhum professor aprovado foi encontrado.</p>
      </div>
    </ng-template>
  </div>
</ion-content>
