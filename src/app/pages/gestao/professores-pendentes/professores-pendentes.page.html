<ion-header>
  <ion-toolbar>
    <ion-button slot="start" fill="clear" (click)="voltar()">
      <ion-icon name="chevron-back-outline"></ion-icon>
    </ion-button>
    <ion-title>Professores Pendentes</ion-title>
    <app-logout-button slot="end"></app-logout-button>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="page-shell">
    <section class="page-hero">
      <p class="eyebrow">Validação</p>
      <h1>Cadastros aguardando análise</h1>
      <p>Aprove ou rejeite novas solicitações de acesso com rapidez e clareza.</p>
    </section>

    <div class="pending-list" *ngIf="pendingUsers.length > 0; else emptyPending">
      <article class="pending-card surface-panel" *ngFor="let user of pendingUsers">
        <div>
          <h2>{{ user.name }}</h2>
          <p>{{ user.email }}</p>
        </div>

        <div class="actions">
          <ion-button color="success" (click)="approveUser(user.id)">Aprovar</ion-button>
          <ion-button color="danger" fill="outline" (click)="rejectUser(user.id)">Rejeitar</ion-button>
        </div>
      </article>
    </div>

    <ng-template #emptyPending>
      <div class="empty-state surface-panel">
        <p>Não há professores pendentes neste momento.</p>
      </div>
    </ng-template>
  </div>
</ion-content>
